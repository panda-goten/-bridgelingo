var q=document.getElementById("q"),list=document.getElementById("list"),count=document.getElementById("count"),empty=document.getElementById("empty"),category=document.getElementById("category");

function esc(s){return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]})}
function norm(s){return String(s||"").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g,"")}
function searchable(x){return norm([x.id,x.category,x.ja,x.en,x.zh_cn,x.pinyin,x.zh_tw,x.zhuyin,x.nan,x.tailo,x.is,x.tags.join(" ")].join(" "))}
function cls(k){return visible[k]?"":" hidden"}
function row(k,label,text){return '<div class="lang lang-'+k+cls(k)+'"><div class="lab">'+label+'</div><div>'+esc(text)+'</div></div>'}

function makeCard(x){

 return a
}

function render(){
 var z=norm(q.value.trim()),cat=category.value;

}
