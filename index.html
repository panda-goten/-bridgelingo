var q=document.getElementById("q"),list=document.getElementById("list"),count=document.getElementById("count"),empty=document.getElementById("empty");
function esc(s){return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]})}
function norm(s){return String(s||"").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g,"")}
function searchable(x){return norm([x.id,x.ja,x.en,x.zh_cn,x.pinyin,x.zh_tw,x.zhuyin,x.nan,x.tailo,x.is,x.cat,x.tags.join(" "),Object.values(x.ex).join(" ")].join(" "))}
function cls(k){return visible[k]?"":" hidden"}function row(k,l,t){return '<div class="lang lang-'+k+cls(k)+'"><div class="lab">'+l+'</div><div>'+esc(t)+'</div></div>'}function pr(k,t){return '<div class="pron lang-'+k+cls(k)+(k==='zh_tw'?' zhuyin':'')+'">'+esc(t)+'</div>'}
function ex(k,l,t,p){return '<div class="ex lang-'+k+cls(k)+'"><b>'+l+'</b>　'+esc(t)+(p?'<span class="ex-pron'+(k==='zh_tw'?' zhuyin':'')+'">'+esc(p)+'</span>':'')+'</div>'}
function make(x){var a=document.createElement("article");a.className="card";a.innerHTML='<button class="summary"><div class="top"><div class="ja">'+esc(x.ja)+'</div><div class="arrow">⌄</div></div>'+row("en","EN",x.en)+'<div class="group-title lang-zh_cn'+cls("zh_cn")+'">中国語（普通話）</div>'+row("zh_cn","簡体",x.zh_cn)+pr("zh_cn",x.pinyin)+'<div class="group-title lang-zh_tw'+cls("zh_tw")+'">台湾華語</div>'+row("zh_tw","繁体",x.zh_tw)+pr("zh_tw",x.zhuyin)+'<div class="group-title lang-nan'+cls("nan")+'">台湾語</div>'+row("nan","台語",x.nan)+pr("nan",x.tailo)+row("is","ÍS",x.is)+'<div class="chips"><span class="chip">'+esc(x.cat)+'</span>'+x.tags.map(function(t){return '<span class="chip">#'+esc(t)+'</span>'}).join("")+'</div></button><div class="detail"><div class="ttl">EXAMPLES</div>'+ex("en","英",x.ex.en,"")+ex("zh_cn","中",x.ex.zh_cn,x.ex.pinyin)+ex("zh_tw","華",x.ex.zh_tw,x.ex.zhuyin)+ex("nan","台",x.ex.nan,x.ex.tailo)+ex("is","氷",x.ex.is,"")+'<div class="meta">日本語：'+esc(x.ex.ja)+'<br>Concept ID：'+esc(x.id)+'</div></div>';a.querySelector(".summary").onclick=function(){a.classList.toggle("open")};return a}
function render(){var z=norm(q.value.trim()),arr=DATA.filter(function(x){return !z||searchable(x).includes(z)});list.innerHTML="";arr.forEach(function(x){list.appendChild(make(x))});count.textContent=arr.length+"件";empty.style.display=arr.length?"none":"block"}
q.oninput=render;document.querySelectorAll(".lang-btn").forEach(function(b){b.onclick=function(){var k=b.dataset.lang;visible[k]=!visible[k];b.classList.toggle("on",visible[k]);render()}});document.getElementById("openAll").onclick=function(){document.querySelectorAll(".card").forEach(function(c){c.classList.add("open")})};document.getElementById("closeAll").onclick=function(){document.querySelectorAll(".card").forEach(function(c){c.classList.remove("open")})};document.getElementById("clear").onclick=function(){q.value="";render();q.focus()};render();
