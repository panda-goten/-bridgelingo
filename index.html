<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BridgeLingo Trial</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f7f3ee;margin:0;padding:16px}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;font-size:16px}
.card{background:#fff;border-radius:16px;padding:14px;margin:12px 0;border:1px solid #ddd}
.title{font-size:22px;font-weight:bold;cursor:pointer}
.detail{display:none;margin-top:12px;border-top:1px solid #eee;padding-top:12px}
.small{color:#666;font-size:14px}
</style>
</head>
<body>
<h2>BridgeLingo 試作2</h2>
<input id="q" placeholder="検索">

<div id="list"></div>

<script>
const data=[
{ja:"なるほど。",en:"I see.",zh:"原来是这样。",py:"Yuánlái shì zhèyàng.",is:"Ég skil.",ex:"なるほど、そういうことか。"},
{ja:"本当に？",en:"Really?",zh:"真的吗？",py:"Zhēn de ma?",is:"Í alvöru?",ex:"本当にそうなの？"},
{ja:"もちろん。",en:"Of course.",zh:"当然可以。",py:"Dāngrán kěyǐ.",is:"Auðvitað.",ex:"もちろん手伝うよ。"},
{ja:"ありがとう。",en:"Thank you.",zh:"谢谢。",py:"Xièxie.",is:"Takk.",ex:"ありがとうございます。"},
{ja:"頑張って！",en:"Good luck!",zh:"加油！",py:"Jiāyóu!",is:"Gangi þér vel!",ex:"頑張って！応援してる。"}
];

function render(){
 const q=document.getElementById("q").value.toLowerCase();
 const list=document.getElementById("list");
 list.innerHTML="";
 data.filter(x=>JSON.stringify(x).toLowerCase().includes(q)).forEach(x=>{
   const card=document.createElement("div");
   card.className="card";
   card.innerHTML=`
      <div class="title">${x.ja}</div>
      <div>🇬🇧 ${x.en}</div>
      <div>🇨🇳 ${x.zh}</div>
      <div class="small">${x.py}</div>
      <div>🇮🇸 ${x.is}</div>
      <div class="detail">
        <b>例文</b><br>${x.ex}
      </div>`;
   const title=card.querySelector(".title");
   const detail=card.querySelector(".detail");
   title.addEventListener("click",()=>{
      detail.style.display=detail.style.display==="block"?"none":"block";
   });
   list.appendChild(card);
 });
}
document.getElementById("q").addEventListener("input",render);
render();
</script>
</body>
</html>
